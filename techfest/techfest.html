<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>techfest</title>
</head>
<body>
    <form>
    <h3>
        <label for="name">Participant Name:
            <input type="text" placeholder="Enter your name"></h3>
        </label>
        <h3>
            <label for="email">Email:
                <input type="email" placeholder="Enter your email"></h3>

            </label>

        <h3><label for="dept">Department:</h3>
            <select name="" id="">
                <option value="cse">CSE</option>
                <option value="csbs">CSBS</option>
                <option value="cscs">CSCS</option>
                <option value="csds">CSDS</option>
                <option value="aiml">AIML</option>
                <option value="ece">ECE</option>
                <option value="eie">EIE</option>
                <option value="ecs">ECS</option>
                <option value="iot">IoT</option>
                <option value="mech">MECHANICAL</option>
                <option value="civil">CIVIL</option>
                <option value="ee">ELECTRICAL</option>
                <option value="bca">BCA</option>
                <option value="bba">BBA</option>
                <option value="ft">FT</option>
                <option value="bhm">BHM</option>

            </select>
            <h3>
                <label for="roll">Roll No.:
                    <input type="number" placeholder="Enter your university roll no/ Student Id" style="width: 242px">
                </label>
            </h3>

        <h3>
            <label for="events">Events Interested In: </h3>
                <input type="checkbox" name="choice" value="hack">Hackathon <br>
                <input type="checkbox" name="choice" value="robo">Robotics <br>
                <input type="checkbox" name="choice" value="photo">Photography <br>
                <input type="checkbox" name="choice" value="video">Videography <br>
                <input type="checkbox" name="choice" value="debate">Debate <br>
                <input type="checkbox" name="choice" value="quiz">Quiz <br>
                <input type="checkbox" name="choice" value="design">Poster Design <br>
                <input type="checkbox" name="choice" value="cosplay">Cosplay <br>
                <input type="checkbox" name="choice" value="apti">Aptitude <br>
                <input type="checkbox" name="choice" value="code">Coding Challanges 
                
            </label>
            <h3>
                <label for="reg">
                    <input type="submit" value="Register">
                </label>
            </h3>
        
           
    
</form>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login page</title>
    <style>
        body {
            font-family:'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            background-color: black;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card {
            background-color: beige;
            border-radius: 6px;
            padding: 30px;
            width: 300px;
        }
        h1 {
            color: rgb(62, 62, 240);
            text-align: center;
            margin-bottom: 20px;
        }
        form {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        input {
            padding: 7px;
            border-radius: 5px;
            background-color: blanchedalmond;
        }
        button {
            color: rgb(0, 0, 0);
            background-color:rgb(4, 226, 49) ;
            margin-top: 30px;
            font-weight: bold;
            border-radius: 5px;
            width: 80px;
            align-content: center;
            align-self: center;
        
            
            
        }
        button:hover{
            background-color: rgb(20, 146, 96);
        }
        input:hover{
            border-width: 3px;
        }

    </style>
</head>
<body>
    <div class="card">
        <h1>Login</h1>
        <form>
        <input type="email" placeholder="Enter your email">
        <input type="password" placeholder="Enter your password">
        <button type="submit">Login</button>
        </form>


    </div>
    
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navigation</title>
</head>
<style>
    body {
        background-color: black;
        margin: 0px;
        padding: 20px;


    }
    h1 {
        color: aliceblue;
        margin: 10px;
        padding: 0px;
        font-family: Arial, Helvetica, sans-serif;
    }
    .navbar1 {
        background-color: aliceblue;
        padding: 15px;
        margin: 0px;
        margin-bottom: 40px;

    }
    .navbar1 ul {
        list-style: none;
        margin: 0px;
        padding: 0px;
        display: flex;
        justify-content: space-around;
    }
    .navbar1 li {
        display: inline;
    }
    .navbar1 a{
        color: rgb(196, 36, 36);
        text-decoration: none;
        padding: 5px 10px;
        border-radius: 8px;
        position: relative;

    }
    .navbar1 a::after{
        content: "";
        position: absolute;
        height: 2px;
        width: 100%;
        bottom: 0;
        left: 0;
        background-color: rgb(196, 85, 85);
        transform: scaleX(0);
        transition: transform 0.3s ease-in-out;
    }
    .navbar1 a:hover::after {
        transform: scaleX(1);
    }
    .navbar1 .login-button {
        
        background-color: rgb(213, 123, 13);
        color: rgb(0, 0, 0);
        border-radius: 8px;
        padding: 2px 5px;
        cursor: pointer;
        
        
    }
    
    .navbar2 {
        background-color: rgb(131, 213, 213);
        margin: 0px;
        padding: 15px;
        margin-top: 20px;
        width: 200px;
    }
    .navbar2 ul {
        list-style: none;
        margin: 0px;
        
    }
    .navbar2 li {
        margin-bottom: 10px;
    }
    .navbar2 a {
        text-decoration: none;
        display: flex;
        padding: 10px;
        width: 97%;
        display: block;
    }
    .navbar2 a:hover {
        background-color: rgb(48, 178, 178);
    }
    .navbar2 .login-button {
        background-color: rgb(48, 178, 178);
        color: aliceblue;
        padding: 5px 12px;
        border: 0px;
        border-radius: 15px;
        cursor: pointer;
        width: 100%;
    }
    .navbar2 .login-button:hover {
        background-color: rgb(17, 123, 123);
        
    }
</style>
<body>
    <h1>Horizontal With Underline Effect </h1>
    <header>
        <nav class="navbar1">
            <ul>

                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Products</a></li>
                <li>
                    <button class="login-button">Login</button>
                </li>
            </ul>



        </nav>
    </header>
            <h1>Vertical With Hover Effect</h1>
            <nav class="navbar2">
            <ul>

                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Products</a></li>
                <li>
                    <button class="login-button">Login</button>
                </li>
            </ul>



        </nav>
</body>
</html>

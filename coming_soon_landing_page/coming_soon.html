<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chai Landing Page</title>
</head>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playwrite+ID:wght@100..400&display=swap');
    html,body {
        margin: 0px;
        padding: 0px;
        height: 100%;
        font-family: "Playwrite ID", cursive;
    }
    .container {
        background: linear-gradient(250deg, rgb(163, 17, 56),rgb(0, 0, 0));
        min-height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    .content {
        text-align: center;
        background-color: beige;
        padding: 20px 30px;
        border-radius: 6px;
        width: 375px;
    }
    .logo {
        width: 150px;
        object-fit: contain;
    }
    .content h1 {
        color: rgb(153, 27, 27);
        margin-bottom: 20px;

    }
    .content p {
        color: rgb(219, 135, 135);
    }
    form {
        display: flex;
        flex-direction: column;
    }
    input[type="email"] {
        padding: 8px;
        margin-bottom: 10px;
        border: 1.5px solid rgb(203, 61, 61);
        border-radius: 8px;
        font-family:'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
    }
    button {
        padding: 5px;
        background-color:rgb(200, 69, 69);
        color: beige;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: background-color 0.4s ease-in-out;
        font-family:'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;

    }
    button:hover {
        background-color: rgb(106, 11, 11);
    }
    input:hover {
        border: 2px solid rgb(203, 61, 61);
    }

</style>
<body>
    <div class="container">
        <div class="content">
            <img src="../images/1743191156468-removebg-preview.png" class="logo" alt="logo">
            <h1>Coming Soon...</h1>
            <p>We're working hard to bring something interesting soon. Stay tuned!!</p>
            <form id="notify_form">
                <input type="email" placeholder="Enter your email" required>
                <button type="submit">Notify Me</button>
            </form>
        </div>
    </div>
</body>
</html>
